<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Automated Loan Approval System</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
        <!-- NAVBAR -->
<div class="navbar">
    <div class="logo">LoanAI</div>
    <div class="nav-links">
        <a href="/static/home.html"class="active">Home</a>
        <a href="/static/about.html" class="active">About</a>
        <a href="#">Contact</a>
        <a href="#" onclick="logout()">Logout</a>
    </div>
</div>

    <!-- LEFT SIDE (optional branding like login) -->
    <div class="left">
        <h1>Automated Loan Approval</h1>
        <p>Check eligibility and get instant decisions.</p>

        <div class="features">
            <div>📊 Smart Risk Analysis</div>
            <div>⚡ Instant Approval</div>
            <div>🔒 Secure Processing</div>
        </div>
    </div>

<div class="right">

    <div class="card">

        <h1>Automated Loan Approval</h1>
        <p class="subtitle">Internal Bank Loan Processing Tool</p>

        <form id="loanForm">

            <div class="form-group">
                <label>Aadhaar Number</label>
                <input type="text" id="aadhar" minlength="12" maxlength="12" required>
            </div>

            <div class="form-group">
                <label>PAN Number</label>
                <input type="text" id="pan" required>
            </div>

            <div class="form-group">
                <label>Monthly Income (₹)</label>
                <input type="number" id="income" min="1" required>
            </div>

            <div class="form-group">
                <label>Experience (Years)</label>
                <input type="number" id="experience" min="0" required>
            </div>

            <div class="form-group">
                <label>Loan Amount (₹)</label>
                <input type="number" id="loan_amount" required>
            </div>

            <button type="submit">Check Loan Eligibility</button>

        </form>

        <div id="loading" class="hidden">Processing...</div>
        <div id="result" class="result hidden"></div>

        <button class="logout-btn" onclick="logout()">Logout</button>

    </div>

</div>

<script>
function logout() {
    window.location.href = "/";
}
</script>

<script src="/static/app.js"></script>

</body>
</html>
