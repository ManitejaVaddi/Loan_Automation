<!DOCTYPE html>
<html lang="en"> 
<head>
    <meta charset="UTF-8" />
    <title>Automated Loan Approval System</title>

    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<div class="container">
    <h1>Automated Loan Approval System</h1>
    <p class="subtitle">Internal Bank Loan Processing Tool</p>

    <form id="loanForm">
        <label for="aadhar">Aadhaar Number</label>
        <input type="text" id="aadhar" minlength="12" maxlength="12" required />

        <label for="pan">PAN Number</label>
        <input type="text" id="pan" required />

        <label for="income">Monthly Income (₹)</label>
        <input type="number" id="income" min="1" required />

        <label for="experience">Experience (Years)</label>
        <input type="number" id="experience" min="0" required />

        <label for="loan_amount">Loan Amount (₹)</label>
        <input type="number" id="loan_amount" required />

        <button type="submit">Check Loan Eligibility</button>
    </form>

    <div id="loading" class="hidden">Processing...</div>

    <div id="result" class="result hidden"></div>
</div>

<script src="/static/app.js"></script>

</body>
</html>
